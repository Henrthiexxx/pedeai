<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Historico Local</title>
  <style>
    :root{--bg:#0f1115;--bg2:#171a21;--text:#e9edf5;--muted:#aab2c5;--line:#2a3140;--brand:#4f8cff;--ok:#22c55e}
    [data-theme="light"]{--bg:#f5f7fb;--bg2:#ffffff;--text:#0f172a;--muted:#51607a;--line:#d8deea;--brand:#2563eb;--ok:#15803d}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:18px}
    .head{display:flex;gap:10px;justify-content:space-between;align-items:center;margin-bottom:14px}
    .title{font-size:1.1rem;font-weight:700}
    .muted{color:var(--muted);font-size:.84rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{border:1px solid var(--line);background:var(--bg2);color:var(--text);padding:9px 12px;border-radius:10px;cursor:pointer;font-size:.84rem}
    .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
    .btn.danger{border-color:#7f1d1d;color:#fecaca}
    .cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:12px}
    .card{border:1px solid var(--line);background:var(--bg2);border-radius:12px;padding:10px}
    .k{font-size:.76rem;color:var(--muted)} .v{font-weight:700;margin-top:4px}
    .table{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--bg2)}
    table{width:100%;border-collapse:collapse} th,td{padding:10px 9px;border-bottom:1px solid var(--line);font-size:.82rem;text-align:left}
    th{font-size:.75rem;color:var(--muted);font-weight:600}
    .right{text-align:right}
    .empty{padding:26px;text-align:center;color:var(--muted)}
    @media (max-width:900px){.cards{grid-template-columns:repeat(2,minmax(0,1fr))}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div>
        <div class="title">Historico Local</div>
        <div class="muted">Vendas locais salvas neste PC.</div>
      </div>
      <div class="actions">
        <button class="btn primary" onclick="openStatistics()">Abrir Estatisticas</button>
        <button class="btn" onclick="reloadData()">Atualizar</button>
        <button class="btn danger" onclick="clearAll()">Limpar Historico</button>
      </div>
    </div>

    <div class="cards">
      <div class="card"><div class="k">Total de vendas</div><div class="v" id="kTotalSales">0</div></div>
      <div class="card"><div class="k">Valor acumulado</div><div class="v" id="kTotalAmount">R$ 0,00</div></div>
      <div class="card"><div class="k">Ticket medio</div><div class="v" id="kAvg">R$ 0,00</div></div>
      <div class="card"><div class="k">Ultimo registro</div><div class="v" id="kLast">-</div></div>
    </div>

    <div class="table" id="tableBox">
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Origem</th>
            <th>Pagamento</th>
            <th class="right">Itens</th>
            <th class="right">Total</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <div class="empty" id="empty" style="display:none">Nenhuma venda local encontrada.</div>
    </div>
  </div>

  <script src="pedra-web-db.js"></script>
  <script>
    function money(v){return (Number(v)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
    function dt(v){if(!v)return '-';const d=new Date(v);return isNaN(d)?'-':d.toLocaleString('pt-BR')}
    function setThemeFromParent(){
      try{
        const t=window.parent?.document?.documentElement?.getAttribute('data-theme');
        if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t);
      }catch(e){}
    }
    setThemeFromParent();
    setInterval(setThemeFromParent,1200);

    async function reloadData(){
      const rows=document.getElementById('rows');
      const empty=document.getElementById('empty');
      rows.innerHTML='';

      if(!window.PedraElectron?.sales?.list){
        empty.style.display='block';
        empty.textContent='Historico local disponivel apenas no app de PC.';
        return;
      }

      const resp=await window.PedraElectron.sales.list({limit:5000});
      const items=Array.isArray(resp?.items)?resp.items:[];

      let total=0;
      let totalItems=0;
      for(const s of items){
        total+=Number(s.total)||0;
        totalItems+=Array.isArray(s.items)?s.items.reduce((a,i)=>a+(Number(i.qty)||0),0):0;
      }

      document.getElementById('kTotalSales').textContent=String(items.length);
      document.getElementById('kTotalAmount').textContent=money(total);
      document.getElementById('kAvg').textContent=money(items.length?total/items.length:0);
      document.getElementById('kLast').textContent=dt(items[0]?.createdAtLocal||items[0]?.createdAt);

      if(!items.length){
        empty.style.display='block';
        return;
      }

      empty.style.display='none';
      rows.innerHTML=items.map(s=>{
        const when=dt(s.createdAtLocal||s.createdAt);
        const source=s.sourceDetail==='table'?'Mesa':'PDV';
        const pay=s.paymentMethod||'local';
        const count=Array.isArray(s.items)?s.items.reduce((a,i)=>a+(Number(i.qty)||0),0):0;
        const totalRow=Number(s.total)||0;
        return `<tr><td>${when}</td><td>${source}</td><td>${pay}</td><td class="right">${count}</td><td class="right">${money(totalRow)}</td></tr>`;
      }).join('');
    }

    async function clearAll(){
      if(!window.PedraElectron?.sales?.clear) return;
      if(!confirm('Limpar todo o historico local deste PC?')) return;
      await window.PedraElectron.sales.clear();
      await reloadData();
    }

    function openStatistics(){
      if(window.parent){
        window.parent.postMessage({type:'historyOpenStatistics'},'*');
      }
    }

    reloadData().catch(()=>{});
  </script>
</body>
</html>
