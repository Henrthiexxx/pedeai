<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Entrar — Pedra Delivery</title>
    <meta name="theme-color" content="#09090b">
    <link rel="icon" href="icon-192.png">
    <script>(function(){var t=localStorage.getItem('pedrad-theme')||'dark';document.documentElement.setAttribute('data-theme',t)})();</script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* garante contraste do texto secundário como no painel */
        html[data-theme="dark"]{--text-2:#9ca3af}
        .login-error{
            display:none;margin-top:14px;padding:10px 12px;border-radius:10px;
            background:rgba(248,113,113,.10);border:1px solid rgba(248,113,113,.28);
            color:#f87171;font-size:.82rem;line-height:1.4;text-align:center;
        }
        .btn-block[disabled]{opacity:.6;cursor:not-allowed}
        .login-boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
            background:var(--bg-0);color:var(--text-2);font-size:.9rem;z-index:50}
    </style>
</head>
<body>

<!-- Enquanto o Firebase restaura a sessão, evita piscar o formulário -->
<div class="login-boot" id="loginBoot">Carregando…</div>

<div id="authPage" class="auth-page" style="display:none">
    <div class="auth-box">
        <div class="auth-logo">
            <div class="auth-brand-mark"><img src="icon-192.png" alt="Pedra Delivery"></div>
            <div class="auth-brand-text"><span>Pedra</span> Delivery</div>
            <p>Painel do estabelecimento</p>
        </div>
        <div class="auth-card">
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">E-mail</label>
                    <input type="email" class="form-input" id="loginEmail" placeholder="loja@email.com" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Senha</label>
                    <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Entrar</button>
                <div class="login-error" id="loginError"></div>
            </form>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script>
(function () {
    const firebaseConfig = {
        apiKey: "AIzaSyAnIJRcUxN-0swpVnonPbJjTSK87o4CQ_g",
        authDomain: "pedrad-814d0.firebaseapp.com",
        projectId: "pedrad-814d0",
        storageBucket: "pedrad-814d0.appspot.com",
        messagingSenderId: "293587190550",
        appId: "1:293587190550:web:80c9399f82847c80e20637"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(() => {});

    const boot = document.getElementById('loginBoot');
    const authPage = document.getElementById('authPage');
    let redirecting = false;

    // Sessão já ativa → vai direto para o painel (não mostra o formulário).
    auth.onAuthStateChanged(user => {
        if (user) {
            if (redirecting) return;
            redirecting = true;
            location.replace('index.html');
            return;
        }
        boot.style.display = 'none';
        authPage.style.display = 'flex';
    });

    function friendlyError(err) {
        const code = String(err && err.code || '');
        if (code.includes('invalid-email')) return 'E-mail inválido.';
        if (code.includes('user-disabled')) return 'Esta conta está desativada.';
        if (code.includes('user-not-found') || code.includes('wrong-password') ||
            code.includes('invalid-credential') || code.includes('invalid-login-credentials'))
            return 'E-mail ou senha incorretos.';
        if (code.includes('too-many-requests')) return 'Muitas tentativas. Tente novamente em instantes.';
        if (code.includes('network')) return 'Sem conexão. Verifique sua internet.';
        return 'Não foi possível entrar. Tente novamente.';
    }

    window.handleLogin = async function (e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const pw = document.getElementById('loginPassword').value;
        const btn = document.getElementById('loginBtn');
        const errBox = document.getElementById('loginError');
        errBox.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'Entrando…';
        try {
            await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
            await auth.signInWithEmailAndPassword(email, pw);
            // O redirecionamento acontece no onAuthStateChanged.
        } catch (err) {
            errBox.textContent = friendlyError(err);
            errBox.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Entrar';
        }
    };
})();
</script>
</body>
</html>
