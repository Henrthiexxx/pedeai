<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Pedra Delivery — Entrar</title>

  <meta name="theme-color" content="#060606" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="icon" href="icon-192.png" />
  <link rel="prefetch" href="home.html" />

  <style>
    @keyframes appIn { from { opacity:0; transform:scale(1.025) } to { opacity:1; transform:scale(1) } }
    @keyframes glowPulse { 0%,100% { opacity:.55 } 50% { opacity:.85 } }
    @keyframes drift { 0% { transform:translateY(0) translateX(0); opacity:0 } 10% { opacity:.5 } 90% { opacity:.5 } 100% { transform:translateY(-180px) translateX(14px); opacity:0 } }
    @keyframes spin { to { transform: rotate(360deg); } }

    :root {
      --g:         #22c55e;
      --neon:      #2dff9e;
      --neon-soft: rgba(45,255,158,.14);
      --neon-line: rgba(45,255,158,.28);
      --ink-0:     #f4f5f4;
      --ink-1:     #c4c8c6;
      --ink-2:     #7d847f;
      --ink-3:     #4a504c;
      --glass:     rgba(18,20,19,.66);
      --hair:      rgba(255,255,255,.06);
      --red:       #f87171;
      --red-bg:    rgba(248,113,113,.10);
      --red-b:     rgba(248,113,113,.30);
    }
    * { box-sizing:border-box }

    body{
      margin:0;min-height:100dvh;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--ink-0);background:#060606;overflow-x:hidden;
    }

    #mainApp{ display:none; }

    /* ── Auth page ── */
    .auth-wrap{
      position:relative;z-index:1;min-height:100dvh;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:calc(env(safe-area-inset-top,0px) + 30px) 18px calc(env(safe-area-inset-bottom,0px) + 30px);
      animation:appIn .26s cubic-bezier(.16,1,.3,1) both;
    }

    /* ── Ambient background layers ── */
    .amb{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .amb-glow{position:absolute;top:-22%;right:-18%;width:78vw;height:78vw;max-width:560px;max-height:560px;
      background:radial-gradient(circle at 50% 50%, rgba(45,255,158,.22) 0%, rgba(34,197,94,.10) 38%, transparent 70%);
      filter:blur(8px);animation:glowPulse 7s ease-in-out infinite}
    .amb-glow.b{top:auto;bottom:-26%;right:auto;left:-24%;width:70vw;height:70vw;max-width:480px;max-height:480px;
      background:radial-gradient(circle at 50% 50%, rgba(34,197,94,.10) 0%, transparent 68%);animation-duration:9s}
    .amb-grain{position:absolute;inset:0;
      background:radial-gradient(ellipse 120% 50% at 50% -10%, rgba(20,40,30,.5) 0%, transparent 60%),
      linear-gradient(180deg, transparent 0%, rgba(0,0,0,.4) 100%)}
    .particles{position:absolute;inset:0}
    .particles span{position:absolute;bottom:-12px;border-radius:50%;background:var(--neon);box-shadow:0 0 6px rgba(45,255,158,.8);animation:drift linear infinite}

    /* ── Brand (mark + título + subtítulo alinhados) ── */
    .auth-brand{display:flex;align-items:center;gap:13px;margin-bottom:26px}
    .auth-brand-mark{width:48px;height:48px;border-radius:13px;overflow:hidden;flex-shrink:0;
      box-shadow:0 6px 20px rgba(0,0,0,.5),0 0 0 1px var(--neon-line),0 0 26px rgba(45,255,158,.25)}
    .auth-brand-mark img{width:100%;height:100%;object-fit:cover;display:block}
    .auth-brand-text{display:flex;flex-direction:column;line-height:1.12}
    .auth-brand-title{font-size:1.5rem;font-weight:800;letter-spacing:-.03em;color:var(--ink-0)}
    .auth-brand-title span{color:var(--neon)}
    .auth-brand-sub{font-size:.78rem;color:var(--ink-2);font-weight:600;margin-top:4px;letter-spacing:.01em}

    /* ── Card ── */
    .auth-card{
      width:100%;max-width:404px;position:relative;overflow:hidden;border-radius:26px;padding:24px 22px;
      background:radial-gradient(120% 90% at 100% 0%, rgba(45,255,158,.10) 0%, transparent 52%),var(--glass);
      border:1px solid var(--neon-line);
      -webkit-backdrop-filter:blur(26px) saturate(150%);backdrop-filter:blur(26px) saturate(150%);
      box-shadow:0 22px 50px rgba(0,0,0,.55),0 1px 0 rgba(255,255,255,.06) inset;
    }
    .auth-card::after{content:"";position:absolute;top:0;right:0;width:150px;height:150px;
      background:radial-gradient(circle at 100% 0%, rgba(45,255,158,.28) 0%, transparent 62%);pointer-events:none;opacity:.7}

    /* ── Erro de login ── */
    .login-error{
      display:none;position:relative;z-index:1;
      background:var(--red-bg);border:1px solid var(--red-b);color:var(--red);
      font-size:.82rem;padding:11px 14px;border-radius:12px;margin-bottom:16px;
    }
    .login-error.show{display:block}

    /* ── Form ── */
    .form-group{margin-bottom:14px;position:relative;z-index:1}
    .form-label{display:block;font-size:.68rem;color:var(--ink-2);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
    .form-input{width:100%;padding:13px 14px;background:rgba(255,255,255,.04);border:1px solid var(--hair);border-radius:13px;color:var(--ink-0);font-family:inherit;font-size:.9rem;transition:.16s}
    .form-input:focus{outline:none;border-color:var(--neon-line);background:rgba(45,255,158,.05);box-shadow:0 0 0 3px rgba(45,255,158,.10)}
    .form-input::placeholder{color:var(--ink-3)}

    /* ── Submit ── */
    .btn-submit{width:100%;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:15px;cursor:pointer;
      font-family:inherit;font-size:.92rem;font-weight:800;letter-spacing:-.01em;color:#04130b;border:none;
      background:linear-gradient(180deg,var(--neon) 0%,var(--g) 100%);
      box-shadow:0 6px 18px rgba(34,197,94,.4),inset 0 1px 0 rgba(255,255,255,.35);
      transition:transform .14s,box-shadow .14s,opacity .14s;margin-top:4px}
    .btn-submit:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(34,197,94,.5)}
    .btn-submit:active{transform:translateY(0)}
    .btn-submit:disabled{opacity:.55;cursor:not-allowed;transform:none}

    .auth-hint{text-align:center;color:var(--ink-3);font-size:.74rem;margin-top:18px;position:relative;z-index:1}

    .spinner-inline{
      display:none;width:16px;height:16px;
      border:2px solid rgba(255,255,255,0.4);border-top-color:#04130b;
      border-radius:50%;animation:spin 0.7s linear infinite;
    }
    .btn-submit.loading .spinner-inline{display:inline-block}
    .btn-submit.loading .btn-text{display:none}
  </style>
</head>

<body>

  <!-- Ambient background -->
  <div class="amb" id="amb">
    <div class="amb-glow"></div>
    <div class="amb-glow b"></div>
    <div class="amb-grain"></div>
    <div class="particles" id="particles"></div>
  </div>

  <div id="authPage" class="auth-wrap">
    <div class="auth-brand">
      <div class="auth-brand-mark"><img src="icon-192.png" alt="Pedra Delivery"></div>
      <div class="auth-brand-text">
        <div class="auth-brand-title"><span>Pedra</span> Delivery</div>
        <div class="auth-brand-sub">Painel do estabelecimento</div>
      </div>
    </div>

    <div class="auth-card">
      <div class="login-error" id="loginError"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="loginEmail">E-mail</label>
          <input
            type="email"
            class="form-input"
            id="loginEmail"
            placeholder="loja@email.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPassword">Senha</label>
          <input
            type="password"
            class="form-input"
            id="loginPassword"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="btn-submit" id="loginBtn">
          <span class="btn-text">Entrar</span>
          <span class="spinner-inline"></span>
        </button>
      </form>

      <div class="auth-hint">Acesso exclusivo para estabelecimentos parceiros</div>
    </div>
  </div>

  <!-- ID esperado pelo app.js -->
  <main id="mainApp">
    <p>Carregando painel...</p>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    const AUTH_ERRORS = {
      "auth/user-not-found": "E-mail não cadastrado.",
      "auth/wrong-password": "Senha incorreta.",
      "auth/invalid-email": "E-mail inválido.",
      "auth/too-many-requests": "Muitas tentativas. Tente novamente em alguns minutos.",
      "auth/user-disabled": "Conta desativada.",
      "auth/invalid-credential": "E-mail ou senha incorretos."
    };

    function showError(msg) {
      const el = document.getElementById("loginError");
      if (!el) return;

      el.textContent = msg;
      el.classList.add("show");
    }

    function clearError() {
      const el = document.getElementById("loginError");
      if (!el) return;

      el.textContent = "";
      el.classList.remove("show");
    }

    function setLoading(isLoading) {
      const btn = document.getElementById("loginBtn");
      if (!btn) return;

      btn.disabled = isLoading;
      btn.classList.toggle("loading", isLoading);
    }

    function showAuth() {
      const authPage = document.getElementById("authPage");
      const mainApp = document.getElementById("mainApp");

      if (authPage) authPage.style.display = "flex";
      if (mainApp) mainApp.style.display = "none";
      spawnParticles();
    }

    function showApp() {
      const authPage = document.getElementById("authPage");
      const mainApp = document.getElementById("mainApp");

      if (authPage) authPage.style.display = "none";
      if (mainApp) mainApp.style.display = "block";
    }

    async function handleLogin(event) {
      event.preventDefault();
      clearError();
      setLoading(true);

      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;

      try {
        await firebase.auth().signInWithEmailAndPassword(email, password);
        showApp();
        window.location.href = "home.html";
      } catch (err) {
        const msg = AUTH_ERRORS[err.code] || "Erro ao entrar. Tente novamente.";
        showError(msg);
        setLoading(false);
      }
    }

    // ══════════ Partículas ══════════
    function spawnParticles() {
      const wrap = document.getElementById('particles');
      if (!wrap || wrap.childElementCount) return;
      for (let i = 0; i < 16; i++) {
        const s = document.createElement('span');
        const sz = 2 + Math.random() * 2.5;
        s.style.width = s.style.height = sz + 'px';
        s.style.left = Math.random() * 100 + '%';
        const dur = 9 + Math.random() * 10;
        s.style.animationDuration = dur + 's';
        s.style.animationDelay = (-Math.random() * dur) + 's';
        wrap.appendChild(s);
      }
    }

    document.getElementById("loginForm").addEventListener("submit", handleLogin);

    firebase.auth().onAuthStateChanged((user) => {
      if (user) {
        showApp();
        window.location.href = "home.html";
      } else {
        showAuth();
        setLoading(false);
      }
    });
  </script>

</body>
</html>
