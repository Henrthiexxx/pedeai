<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Cadastro em Lote - Pedra Delivery</title>
<meta name="theme-color" content="#09090b">
<link rel="stylesheet" href="style.css">
<style>
body{
    font-family:var(--font);
    background:var(--bg-0);
    color:var(--text-0);
    min-height:100dvh;
    padding:16px;
    padding-top:max(16px,env(safe-area-inset-top));
    padding-bottom:max(16px,env(safe-area-inset-bottom));
}
.container{max-width:640px;margin:0 auto}
.page-header{
    display:flex;align-items:flex-start;justify-content:space-between;gap:14px;
    margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border)
}
.page-title{font-size:1.05rem;font-weight:600;letter-spacing:-.02em}
.page-subtitle{font-size:.82rem;color:var(--text-2);margin-top:4px}
.section{
    background:var(--bg-1);border:1px solid var(--border);border-radius:var(--r);
    padding:18px;margin-bottom:14px;box-shadow:var(--sh-sm);transition:all .2s
}
.section:hover{border-color:var(--border-h);box-shadow:var(--sh-md)}
.form-group{margin-bottom:14px}
.form-group:last-child{margin-bottom:0}
.form-label{
    display:block;font-size:.78rem;font-weight:600;color:var(--text-2);margin-bottom:6px;
    letter-spacing:.02em
}
.form-input,.form-select,.input-field{
    width:100%;padding:10px 14px;background:var(--bg-2);border:1px solid var(--border);
    border-radius:var(--rs);color:var(--text-0);font-size:.88rem;font-family:inherit;
    box-shadow:inset 0 1px 2px rgba(0,0,0,.06);transition:border .2s,box-shadow .2s,background .2s
}
.form-input:focus,.form-select:focus,.input-field:focus{
    outline:none;border-color:var(--border-h);
    box-shadow:0 0 0 3px var(--blue-bg),inset 0 1px 2px rgba(0,0,0,.06)
}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.input-box{
    background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r);padding:18px;
    text-align:center;margin-bottom:14px;box-shadow:var(--sh-sm)
}
.input-counter{font-size:.78rem;color:var(--text-2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em}
.input-field{
    padding:14px 16px;font-size:1rem;text-align:center;background:var(--bg-1)
}
.input-hint{font-size:.74rem;color:var(--text-2);margin-top:8px}
.done-msg{
    color:var(--green);text-align:center;padding:16px;font-size:.9rem;
    background:var(--green-bg);border:1px solid var(--green-b);border-radius:var(--rs)
}
.list-wrap{
    background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r);padding:12px 12px 8px;margin-bottom:14px
}
.list-label{
    font-size:.76rem;color:var(--text-2);margin-bottom:10px;text-transform:uppercase;
    letter-spacing:.05em;font-weight:600
}
.list{list-style:none;max-height:280px;overflow-y:auto}
.list li{
    display:flex;align-items:center;gap:8px;padding:10px 10px;background:var(--bg-1);
    border:1px solid var(--border);border-radius:var(--rs);margin-bottom:8px;font-size:.84rem;box-shadow:var(--sh-sm)
}
.list li:last-child{margin-bottom:0}
.list li span{flex:1;line-height:1.45}
.list li input{
    flex:1;background:var(--bg-2);border:1px solid var(--border-h);border-radius:var(--rx);
    color:var(--text-0);padding:7px 9px;font-size:.84rem;font-family:inherit
}
.list li input:focus{outline:none;box-shadow:0 0 0 3px var(--blue-bg)}
.progress{
    font-size:.82rem;color:var(--text-1);margin-bottom:14px;padding:10px 12px;background:var(--bg-2);
    border:1px solid var(--border);border-radius:var(--rs)
}
.actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
.actions .btn{min-width:118px}
.status{font-size:.84rem;text-align:center;margin-top:10px;min-height:20px;color:var(--text-2)}
.loading-state{padding:46px 20px;text-align:center;color:var(--text-2)}
.loading-state .spinner{margin:0 auto 10px}
.muted-box{padding:40px 20px;text-align:center;color:var(--text-2)}
.btn-soft{background:var(--bg-2);color:var(--text-0);border-color:var(--border)}
.btn-soft:hover{background:var(--bg-3);border-color:var(--border-h)}
.btn-success{
    background:var(--green-bg)!important;color:var(--green)!important;border-color:var(--green-b)!important
}
.btn-success:hover{background:rgba(52,211,153,.14)!important;color:var(--green)!important;border-color:rgba(52,211,153,.34)!important}
.btn-danger{
    background:var(--red-bg)!important;color:var(--red)!important;border-color:var(--red-b)!important
}
.btn-danger:hover{background:rgba(248,113,113,.14)!important;color:var(--red)!important;border-color:rgba(248,113,113,.34)!important}
.inline-help{font-size:.74rem;color:var(--text-2);margin-top:6px;line-height:1.45}
@media(max-width:560px){
    .page-header{flex-direction:column;align-items:stretch}
    .config-grid,.grid-2{grid-template-columns:1fr}
    .actions{flex-direction:column}
    .actions .btn{width:100%}
}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="container">
    <div class="page-header">
        <div>
            <div class="page-title">Cadastro em lote</div>
            <div class="page-subtitle">Criação rápida de vários produtos da mesma linha</div>
        </div>
        
    </div>
    <div id="view"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const FC={apiKey:"AIzaSyAnIJRcUxN-0swpVnonPbJjTSK87o4CQ_g",authDomain:"pedrad-814d0.firebaseapp.com",projectId:"pedrad-814d0",storageBucket:"pedrad-814d0.appspot.com",messagingSenderId:"293587190550",appId:"1:293587190550:web:80c9399f82847c80e20637"};
if(!firebase.apps.length)firebase.initializeApp(FC);
const db=firebase.firestore(),auth=firebase.auth();

const params=new URLSearchParams(location.search);
const storeId=params.get('storeId')||localStorage.getItem('currentStoreId');

let state={marca:'',tipo:'',preco:0,categoria:'',quantidade:0,items:[],currentIndex:0,editingId:null,step:'config',categories:[]};
let idCounter=0;

function esc(s){const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500)}
function goBack(event){
  if (event) event.preventDefault();

  // Se estiver dentro de um popup em iframe, fecha o popup pai
  if (window.parent && window.parent !== window && typeof window.parent.closePopup === 'function') {
    window.parent.closePopup();
    return;
  }

  // Se estiver na própria página principal e houver popup aberto
  if (typeof closePopup === 'function') {
    closePopup();
    return;
  }

  // Fallback
  window.history.back();
}
     
        
function applyTheme(theme){
    document.documentElement.setAttribute('data-theme',theme==='light'?'light':'dark');
    const meta=document.querySelector('meta[name="theme-color"]');
    if(meta)meta.setAttribute('content',theme==='light'?'#f5f5f7':'#09090b');
}
function detectParentTheme(){
    try{
        if(window.opener && window.opener.document){
            const t=window.opener.document.documentElement.getAttribute('data-theme');
            if(t)return t;
        }
    }catch(e){}
    try{
        if(window.parent && window.parent!==window && window.parent.document){
            const t=window.parent.document.documentElement.getAttribute('data-theme');
            if(t)return t;
        }
    }catch(e){}
    const keys=['theme','appTheme','data-theme','pedrad-theme','color-theme'];
    for(const key of keys){
        const val=localStorage.getItem(key);
        if(val==='light'||val==='dark')return val;
    }
    return document.documentElement.getAttribute('data-theme')||'dark';
}
function syncTheme(){applyTheme(detectParentTheme())}
syncTheme();
setInterval(syncTheme,1200);
window.addEventListener('storage',syncTheme);

async function loadCategories(){
    if(!storeId)return;
    try{
        const doc=await db.collection('stores').doc(storeId).get();
        const d=doc.exists?doc.data():{};
        state.categories=Array.isArray(d.categories)?d.categories.sort():[];
    }catch(e){}
}

function render(){
    const el=document.getElementById('view');
    if(state.step==='config')el.innerHTML=renderConfig();
    else el.innerHTML=renderInput();
    bindEvents();
}

function renderConfig(){
    const catOpts=state.categories.length
        ?state.categories.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('')
        :'<option value="">Nenhuma disponível</option>';
    return`
    <div class="section">
        <div class="form-group">
            <label class="form-label">Marca</label>
            <input class="form-input" id="fMarca" value="${esc(state.marca)}" placeholder="Ex: Ziggy, Essência...">
        </div>

        <div class="config-grid">
            <div class="form-group">
                <label class="form-label">Tipo</label>
                <input class="form-input" id="fTipo" value="${esc(state.tipo)}" placeholder="Ex: Essência">
            </div>
            <div class="form-group">
                <label class="form-label">Quantidade</label>
                <input class="form-input" id="fQtd" type="number" min="1" max="200" value="${state.quantidade||''}" placeholder="5">
            </div>
        </div>

        <div class="config-grid">
            <div class="form-group">
                <label class="form-label">Preço unitário (R$)</label>
                <input class="form-input" id="fPreco" type="number" step="0.10" min="0" value="${state.preco||''}" placeholder="0,00">
            </div>
            <div class="form-group">
                <label class="form-label">Categoria</label>
                <select class="form-select" id="fCat">
                    <option value="">Selecione...</option>${catOpts}
                </select>
            </div>
        </div>

        <div class="inline-help">Preencha a base comum e depois informe apenas a variação de cada item. Porque repetir coisa igual manualmente é um hobby estranho.</div>

        <div class="actions" style="margin-top:16px">
            <button class="btn btn-soft" onclick="goBack()">Cancelar</button>
            <button class="btn btn-primary" onclick="startInput()">Iniciar cadastro</button>
        </div>
    </div>`;
}

function renderInput(){
    const done=state.currentIndex>=state.quantidade;
    const progress=`${Math.min(state.currentIndex,state.quantidade)} / ${state.quantidade}`;
    const listHtml=state.items.map(it=>{
        if(state.editingId===it.id)
            return`<li>
                <input class="be-edit" data-id="${it.id}" value="${esc(it.nome)}">
                <button class="btn btn-success btn-sm" onclick="saveEdit(${it.id})">Salvar</button>
                <button class="btn btn-danger btn-sm" onclick="delItem(${it.id})">Remover</button>
            </li>`;
        return`<li>
            <span>${esc(state.marca)} ${esc(state.tipo)} <strong>${esc(it.nome)}</strong></span>
            <button class="btn btn-soft btn-sm" onclick="startEditItem(${it.id})">Editar</button>
            <button class="btn btn-danger btn-sm" onclick="delItem(${it.id})">Remover</button>
        </li>`;
    }).join('');

    return`
    <div class="section">
        <div class="progress"><strong>${esc(state.marca)}</strong> · ${esc(state.tipo)} · progresso ${progress}</div>

        ${!done?`
        <div class="input-box">
            <div class="input-counter">Item ${state.currentIndex+1} de ${state.quantidade}</div>
            <input class="input-field" id="nameInput" placeholder="Digite a variação e pressione Enter" autocomplete="off">
            <div class="input-hint">Exemplo: Morango, Uva, 500 ml, Grande, Tradicional</div>
        </div>`:`<div class="done-msg">Todos os nomes foram preenchidos.</div>`}

        <div class="list-wrap">
            ${state.items.length?`<div class="list-label">Itens adicionados (${state.items.length})</div>`:''}
            <ul class="list" id="itemList">${listHtml}</ul>
        </div>

        <div class="actions">
            <button class="btn btn-soft" onclick="goBack()">Cancelar</button>
            ${state.items.length?`<button class="btn btn-success" id="saveBtn" onclick="saveBatch()">Salvar (${state.items.length})</button>`:''}
        </div>
        <div class="status" id="status"></div>
    </div>`;
}

function bindEvents(){
    const nameInput=document.getElementById('nameInput');
    if(nameInput)nameInput.addEventListener('keydown',e=>{if(e.key==='Enter')addName()});
    ['fMarca','fTipo','fQtd','fPreco'].forEach((id,i,arr)=>{
        const el=document.getElementById(id);
        if(el)el.addEventListener('keydown',e=>{
            if(e.key==='Enter'){
                const next=document.getElementById(arr[i+1])||document.getElementById('fCat');
                if(next)next.focus();else startInput();
            }
        });
    });
    if(state.step==='config')document.getElementById('fMarca')?.focus();
    else document.getElementById('nameInput')?.focus();
    if(state.editingId!==null){
        const ed=document.querySelector(`.be-edit[data-id="${state.editingId}"]`);
        if(ed){ed.focus();ed.addEventListener('keydown',e=>{if(e.key==='Enter')saveEdit(state.editingId)})}
    }
}

function startInput(){
    state.marca=(document.getElementById('fMarca')?.value||'').trim();
    state.tipo=(document.getElementById('fTipo')?.value||'').trim();
    state.quantidade=parseInt(document.getElementById('fQtd')?.value)||0;
    state.preco=parseFloat(document.getElementById('fPreco')?.value)||0;
    state.categoria=(document.getElementById('fCat')?.value||'').trim();
    if(!state.marca||!state.tipo||state.quantidade<1){toast('Preencha marca, tipo e quantidade');return}
    state.step='input';state.currentIndex=0;state.items=[];
    render();
}

function addName(){
    const input=document.getElementById('nameInput');
    const nome=(input.value||'').trim();
    if(!nome)return;
    idCounter++;
    state.items.push({id:idCounter,nome});
    state.currentIndex++;
    input.value='';
    document.getElementById('itemList').innerHTML=state.items.map(it=>`<li><span>${esc(state.marca)} ${esc(state.tipo)} <strong>${esc(it.nome)}</strong></span><button class="btn btn-soft btn-sm" onclick="startEditItem(${it.id})">Editar</button><button class="btn btn-danger btn-sm" onclick="delItem(${it.id})">Remover</button></li>`).join('');
    if(state.currentIndex>=state.quantidade){render();return}
    const counter=document.querySelector('.input-counter');
    if(counter)counter.textContent=`Item ${state.currentIndex+1} de ${state.quantidade}`;
    const lbl=document.querySelector('.list-label');
    if(lbl)lbl.textContent=`Itens adicionados (${state.items.length})`;
    const acts=document.querySelector('.actions');
    if(acts&&!document.getElementById('saveBtn')){
        acts.innerHTML=`<button class="btn btn-soft" onclick="goBack()">Cancelar</button><button class="btn btn-success" id="saveBtn" onclick="saveBatch()">Salvar (${state.items.length})</button>`;
    }else if(document.getElementById('saveBtn')){
        document.getElementById('saveBtn').textContent=`Salvar (${state.items.length})`;
    }
    const ul=document.getElementById('itemList');if(ul)ul.scrollTop=ul.scrollHeight;
    input.focus();
}

function startEditItem(id){state.editingId=id;render()}
function saveEdit(id){
    const input=document.querySelector(`.be-edit[data-id="${id}"]`);
    const nome=(input?.value||'').trim();
    if(nome){const it=state.items.find(x=>x.id===id);if(it)it.nome=nome}
    state.editingId=null;render();
}
function delItem(id){
    state.items=state.items.filter(x=>x.id!==id);
    if(state.editingId===id)state.editingId=null;
    render();
}

async function saveBatch(){
    if(!state.items.length)return;
    if(!storeId){toast('StoreId não encontrado');return}
    const btn=document.getElementById('saveBtn');
    if(btn){btn.disabled=true;btn.textContent='Salvando...'}

    try{
        const batch=db.batch();
        const now=firebase.firestore.FieldValue.serverTimestamp();
        state.items.forEach(item=>{
            const ref=db.collection('products').doc();
            batch.set(ref,{
                name:`${state.marca} ${state.tipo} ${item.nome}`,
                marca:state.marca,
                tipo:state.tipo,
                variante:item.nome,
                price:state.preco,
                category:state.categoria,
                active:true,
                storeId:storeId,
                addonGroups:[],
                createdAt:now,
                updatedAt:now
            });
        });
        await batch.commit();
        document.getElementById('status').innerHTML=`<span style="color:var(--green)">${state.items.length} produto(s) criado(s) com sucesso.</span>`;
        toast(`${state.items.length} produtos salvos`);
        setTimeout(goBack,1500);
    }catch(e){
        console.error(e);
        document.getElementById('status').innerHTML=`<span style="color:var(--red)">Erro ao salvar: ${esc(e.message)}</span>`;
        if(btn){btn.disabled=false;btn.textContent=`Salvar (${state.items.length})`}
    }
}

(async()=>{
    if(!storeId){document.getElementById('view').innerHTML='<div class="muted-box">Loja não identificada.</div>';return}
    const user=auth.currentUser||await new Promise(r=>{const u=auth.onAuthStateChanged(x=>{u();r(x)})});
    if(!user){document.getElementById('view').innerHTML='<div class="muted-box">Faça login para continuar.</div>';return}
    await loadCategories();
    render();
})();
</script>
</body>
</html>
