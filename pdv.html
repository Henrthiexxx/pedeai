<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PDV Local — Pedra Delivery</title>
<link rel="stylesheet" href="style.css">
<style>
html,body{height:100%;overflow:hidden}
body{display:flex;flex-direction:column;padding:0;background:var(--bg-0);color:var(--text-0)}

/* Layout */
.pdv{display:flex;flex:1;overflow:hidden}
.pdv-left{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.pdv-right{width:360px;display:flex;flex-direction:column;background:var(--bg-1);flex-shrink:0}
@media(max-width:800px){.pdv{flex-direction:column}.pdv-right{width:100%;max-height:45vh}}

/* Header */
.pdv-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);gap:10px;flex-shrink:0;background:var(--bg-1)}
.pdv-title{font-size:1rem;font-weight:700;letter-spacing:-.02em}
.pdv-controls{display:flex;gap:6px;align-items:center}
.view-btn{width:34px;height:34px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg-2);color:var(--text-2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .15s}
.view-btn:hover{background:var(--bg-3);color:var(--text-0)}.view-btn.active{background:var(--accent);color:var(--accent-t);border-color:var(--accent)}

/* Search + Filters */
.pdv-toolbar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-shrink:0}
.pdv-search{flex:1}
.pdv-search input{width:100%;padding:8px 12px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text-0);font-family:inherit;font-size:.84rem}
.pdv-search input:focus{outline:none;border-color:var(--border-h);box-shadow:0 0 0 3px var(--blue-bg)}
.cat-chips{display:flex;gap:4px;overflow-x:auto;padding:6px 16px;border-bottom:1px solid var(--border);flex-shrink:0;-webkit-overflow-scrolling:touch}
.cat-chip{padding:5px 12px;font-size:.72rem;border-radius:20px;border:1px solid var(--border);color:var(--text-2);background:var(--bg-1);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit}
.cat-chip:hover{border-color:var(--border-h);color:var(--text-0)}.cat-chip.active{background:var(--accent);color:var(--accent-t);border-color:var(--accent)}

/* Presets */
.presets{padding:8px 16px;border-bottom:1px solid var(--border);flex-shrink:0;display:none}
.presets.has-items{display:block}
.presets-label{font-size:.66rem;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.presets-row{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.preset-btn{padding:6px 12px;font-size:.76rem;border-radius:var(--rs);border:1px solid var(--green-b);color:var(--green);background:var(--green-bg);cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s;font-weight:500}
.preset-btn:hover{background:rgba(52,211,153,.15);transform:translateY(-1px)}

/* Product Grid */
.pdv-products{flex:1;overflow-y:auto;padding:12px}
.pdv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.pdv-list .p-card{display:flex;gap:12px;align-items:center}
.pdv-list .p-card .p-img{width:56px;height:56px;flex-shrink:0;border-radius:8px}
.pdv-list .p-card .p-body{display:flex;flex:1;align-items:center;justify-content:space-between}

.p-card{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:var(--sh-sm)}
.p-card:hover{border-color:var(--border-h);box-shadow:var(--sh-md);transform:translateY(-1px)}
.p-card:active{transform:translateY(0)}
.p-img{height:110px;background:var(--bg-2);display:flex;align-items:center;justify-content:center;overflow:hidden}
.p-img img{width:100%;height:100%;object-fit:cover}
.p-img .ph{color:var(--text-3);font-size:.72rem}
.p-body{padding:10px}
.p-name{font-size:.8rem;font-weight:600;line-height:1.3;margin-bottom:2px}
.p-cat{font-size:.68rem;color:var(--text-2)}
.p-price{font-size:.84rem;font-weight:700;margin-top:4px}

/* Cart */
.cart-header{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:600;font-size:.88rem;display:flex;align-items:center;justify-content:space-between}
.cart-badge{background:var(--accent);color:var(--accent-t);font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:10px}
.cart-items{flex:1;overflow-y:auto;padding:8px 12px}
.cart-empty{text-align:center;color:var(--text-3);font-size:.84rem;padding:40px 16px}

.cart-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:6px;transition:all .15s}
.cart-item:hover{border-color:var(--border-h)}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-price{font-size:.72rem;color:var(--text-2);margin-top:1px}
.ci-qty{display:flex;align-items:center;gap:6px}
.ci-qty button{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--bg-3);color:var(--text-0);cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ci-qty button:hover{background:var(--accent);color:var(--accent-t)}
.ci-qty span{min-width:20px;text-align:center;font-weight:600;font-size:.84rem;font-variant-numeric:tabular-nums}
.ci-total{font-size:.84rem;font-weight:700;min-width:60px;text-align:right;font-variant-numeric:tabular-nums}

/* Cart Footer */
.cart-footer{padding:14px 16px;border-top:1px solid var(--border);flex-shrink:0}
.cart-totals{margin-bottom:12px}
.cart-row{display:flex;justify-content:space-between;font-size:.82rem;padding:3px 0;color:var(--text-1)}
.cart-row.final{font-weight:700;font-size:.94rem;color:var(--text-0);padding-top:8px;border-top:1px solid var(--border);margin-top:4px}
.cart-row.tax{color:var(--orange);font-size:.76rem}
.cart-actions{display:flex;gap:8px}
.cart-actions .btn{flex:1;justify-content:center;padding:12px}

/* Toast */
.toast{position:fixed;left:50%;bottom:-80px;transform:translateX(-50%);background:var(--bg-1);border:1px solid var(--border);color:var(--text-0);padding:10px 20px;border-radius:var(--r);font-size:.84rem;z-index:9999;box-shadow:var(--sh-lg);transition:bottom .35s cubic-bezier(.175,.885,.32,1.275);max-width:90vw;text-align:center;font-weight:500}
.toast.show{bottom:24px}
.payment-modal{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:10000;padding:16px}
.payment-modal.show{display:flex}
.payment-box{width:min(520px,100%);background:var(--bg-1);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-lg);padding:18px}
.payment-title{font-size:1rem;font-weight:800;margin-bottom:6px}
.payment-sub{font-size:.82rem;color:var(--text-2);margin-bottom:14px}
.payment-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.payment-opt{border:1px solid var(--border);background:var(--bg-2);color:var(--text-0);border-radius:var(--rs);padding:10px 12px;text-align:left;font-weight:700;cursor:pointer;transition:all .18s}
.payment-opt:hover{background:var(--bg-3);border-color:var(--border-h);transform:translateY(-1px)}
.payment-opt.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--blue-bg)}
.payment-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
@media(max-width:520px){.payment-grid{grid-template-columns:1fr}}

.addon-modal{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:10001;padding:16px}
.addon-modal.show{display:flex}
.addon-box{width:min(620px,100%);max-height:min(760px,92vh);display:flex;flex-direction:column;background:var(--bg-1);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-lg)}
.addon-head{padding:16px 18px;border-bottom:1px solid var(--border)}
.addon-title{font-size:1rem;font-weight:800}.addon-description{font-size:.78rem;color:var(--text-2);margin-top:4px;line-height:1.4}
.addon-groups{padding:14px 18px;overflow-y:auto;display:grid;gap:14px}
.addon-group{border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
.addon-group-head{padding:10px 12px;background:var(--bg-2);display:flex;justify-content:space-between;gap:10px}
.addon-group-name{font-size:.84rem;font-weight:700}.addon-rule{font-size:.7rem;color:var(--text-2)}
.addon-options{display:grid;gap:1px;background:var(--border)}
.addon-option{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-1);cursor:pointer}
.addon-option:hover{background:var(--bg-2)}.addon-option input{width:17px;height:17px;accent-color:var(--accent)}
.addon-option-name{flex:1;font-size:.82rem}.addon-option-price{font-size:.78rem;font-weight:700;color:var(--text-1)}
.addon-error{min-height:20px;padding:0 18px;color:var(--red);font-size:.76rem}
.addon-footer{padding:12px 18px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.addon-total{font-weight:800}.addon-actions{display:flex;gap:8px}
.ci-addons{font-size:.68rem;color:var(--text-2);line-height:1.35;margin-top:3px}
.p-options{font-size:.65rem;color:var(--accent);font-weight:700;margin-top:4px}

.pdv-empty{text-align:center;color:var(--text-3);padding:60px 20px;font-size:.88rem}
</style>
<link rel="stylesheet" href="modules/popup-desktop.css">
</head>
<body>
<div class="toast" id="toast"></div>
<div id="paymentModal" class="payment-modal" aria-hidden="true">
    <div class="payment-box" role="dialog" aria-modal="true" aria-labelledby="paymentTitle">
        <div class="payment-title" id="paymentTitle">Forma de pagamento</div>
        <div class="payment-sub">Selecione como essa venda foi paga.</div>
        <div class="payment-grid" id="paymentGrid"></div>
        <div class="payment-actions">
            <button class="btn btn-ghost" type="button" id="paymentCancelBtn">Cancelar</button>
            <button class="btn btn-primary" type="button" id="paymentConfirmBtn">Confirmar</button>
        </div>
    </div>
</div>
<div id="addonModal" class="addon-modal" aria-hidden="true">
    <div class="addon-box" role="dialog" aria-modal="true" aria-labelledby="addonTitle">
        <div class="addon-head">
            <div class="addon-title" id="addonTitle">Personalizar produto</div>
            <div class="addon-description" id="addonDescription"></div>
        </div>
        <div class="addon-groups" id="addonGroups"></div>
        <div class="addon-error" id="addonError"></div>
        <div class="addon-footer">
            <div class="addon-total" id="addonTotal"></div>
            <div class="addon-actions">
                <button class="btn btn-ghost" type="button" onclick="closeAddonModal()">Cancelar</button>
                <button class="btn btn-primary" type="button" onclick="confirmAddonSelection()">Adicionar</button>
            </div>
        </div>
    </div>
</div>

<div class="pdv-header">
    <div class="pdv-title">PDV Local</div>
    <div class="pdv-controls">
        <button class="view-btn active" id="vGrid" onclick="setView('grid')" title="Grade">▦</button>
        <button class="view-btn" id="vList" onclick="setView('list')" title="Lista">☰</button>
        <button class="view-btn" onclick="toggleTheme()" title="Tema">◐</button>
    </div>
</div>

<div class="pdv">
    <!-- LEFT: Products -->
    <div class="pdv-left">
        <div class="pdv-toolbar">
            <div class="pdv-search"><input id="search" placeholder="Buscar produto..." oninput="renderProducts()"></div>
        </div>
        <div class="cat-chips" id="catChips"></div>
        <div class="presets" id="presetsBar">
            <div class="presets-label">Combos frequentes</div>
            <div class="presets-row" id="presetsList"></div>
        </div>
        <div class="pdv-products" id="productsContainer">
            <div class="pdv-empty">Carregando produtos...</div>
        </div>
    </div>

    <!-- RIGHT: Cart -->
    <div class="pdv-right">
        <div class="cart-header">
            <span>Comanda</span>
            <span class="cart-badge" id="cartBadge">0</span>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="cart-empty">Toque em um produto para adicionar</div>
        </div>
        <div class="cart-footer">
            <div class="cart-totals" id="cartTotals"></div>
            <div class="cart-actions">
                <button class="btn btn-ghost" onclick="clearCart()">Limpar</button>
                <button class="btn" onclick="launchAsOrder()" title="Entra na fila de preparo">Lançar pedido</button>
                <button class="btn btn-primary" onclick="finalizeSale()">Venda direta</button>
            </div>
        </div>
    </div>
</div>

<script src="pedra-web-db.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="dist/renderer/bootstrap.js"></script>
<script>
// ── Firebase ──
const FC={apiKey:"AIzaSyAnIJRcUxN-0swpVnonPbJjTSK87o4CQ_g",authDomain:"pedrad-814d0.firebaseapp.com",projectId:"pedrad-814d0",storageBucket:"pedrad-814d0.appspot.com",messagingSenderId:"293587190550",appId:"1:293587190550:web:80c9399f82847c80e20637"};
if(!firebase.apps.length)firebase.initializeApp(FC);
const db=firebase.firestore(),auth=firebase.auth();

let storeId=(new URLSearchParams(location.search)).get('storeId')||localStorage.getItem('currentStoreId');

// ── State ──
let allProducts=[];
let cart=[];          // [{id,name,price,qty,addons:[]}]
let categories=[];
let selectedCat='all';
let viewMode='grid';  // 'grid' | 'list'
let unsub=null;
let storeData=null;
let _paymentSelected=null;
let addonProduct=null;

// Presets: top 5 combos from localStorage
const PRESETS_KEY='pedrad-pdv-presets-'+storeId;

function esc(s){const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML}
function money(v){return(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500)}
function sameCategory(a,b){return String(a||'').trim().toLocaleLowerCase('pt-BR')===String(b||'').trim().toLocaleLowerCase('pt-BR')}
function productImage(product){
    const own=product?.imageData&&product.imageData.startsWith('data:')?product.imageData:String(product?.imageUrl||'').trim();
    if(own)return own;
    const media=(Array.isArray(storeData?.categoryMedia)?storeData.categoryMedia:[]).find(item=>sameCategory(item?.name,product?.category));
    return String(media?.imageData||media?.imageUrl||'').trim();
}
function normalizeAddonGroups(product){
    return (Array.isArray(product?.addonGroups)?product.addonGroups:[]).map((group,index)=>({
        name:String(group?.name||`Grupo ${index+1}`).trim(),
        type:group?.type==='free'?'free':'paid',
        min:Math.max(0,parseInt(group?.min)||0),
        max:Math.max(0,parseInt(group?.max)||0),
        items:(Array.isArray(group?.items)?group.items:[]).map((item,itemIndex)=>({
            name:String(item?.name||'').trim(),
            price:parseFloat(item?.price)||0,
            order:item?.order??itemIndex
        })).filter(item=>item.name).sort((a,b)=>a.order-b.order)
    })).filter(group=>group.items.length);
}
function addonSum(addons){return(Array.isArray(addons)?addons:[]).reduce((sum,item)=>sum+(parseFloat(item?.price)||0),0)}
function unitPrice(item){return(parseFloat(item?.price)||0)+addonSum(item?.addons)}
function addonSignature(addons){
    return (Array.isArray(addons)?addons:[]).map(item=>`${item.groupName||''}:${item.name}:${parseFloat(item.price)||0}`).sort().join('|');
}
function cartKey(productId,addons){return`${productId}::${addonSignature(addons)}`}
function addonRule(group){
    if(group.min&&group.max)return`Escolha de ${group.min} a ${group.max}`;
    if(group.min)return`Escolha no mínimo ${group.min}`;
    if(group.max)return`Escolha até ${group.max}`;
    return'Escolha opcional';
}
function openAddonModal(product){
    addonProduct=product;
    const groups=normalizeAddonGroups(product);
    document.getElementById('addonTitle').textContent=product.name||'Personalizar produto';
    document.getElementById('addonDescription').textContent=product.description||'Selecione as opções desejadas.';
    document.getElementById('addonError').textContent='';
    document.getElementById('addonGroups').innerHTML=groups.map((group,groupIndex)=>`
        <section class="addon-group" data-group="${groupIndex}" data-min="${group.min}" data-max="${group.max}">
            <div class="addon-group-head">
                <div class="addon-group-name">${esc(group.name)}</div>
                <div class="addon-rule">${esc(addonRule(group))}</div>
            </div>
            <div class="addon-options">${group.items.map((item,itemIndex)=>`
                <label class="addon-option">
                    <input type="checkbox" data-group="${groupIndex}" data-item="${itemIndex}" onchange="handleAddonChange(this)">
                    <span class="addon-option-name">${esc(item.name)}</span>
                    <span class="addon-option-price">${item.price>0?`+ ${money(item.price)}`:'Grátis'}</span>
                </label>`).join('')}
            </div>
        </section>`).join('');
    updateAddonTotal();
    const modal=document.getElementById('addonModal');
    modal.classList.add('show');
    modal.setAttribute('aria-hidden','false');
}
function closeAddonModal(){
    addonProduct=null;
    const modal=document.getElementById('addonModal');
    modal.classList.remove('show');
    modal.setAttribute('aria-hidden','true');
}
function selectedModalAddons(){
    if(!addonProduct)return[];
    const groups=normalizeAddonGroups(addonProduct);
    return [...document.querySelectorAll('#addonGroups input:checked')].map(input=>{
        const group=groups[Number(input.dataset.group)];
        const item=group?.items[Number(input.dataset.item)];
        return item?{name:item.name,price:item.price,order:item.order,groupName:group.name}:null;
    }).filter(Boolean);
}
function handleAddonChange(input){
    const section=input.closest('.addon-group');
    const max=parseInt(section?.dataset.max)||0;
    const checked=section?[...section.querySelectorAll('input:checked')]:[];
    if(max>0&&checked.length>max){
        input.checked=false;
        document.getElementById('addonError').textContent=`Este grupo permite no máximo ${max} opção(ões).`;
    }else document.getElementById('addonError').textContent='';
    updateAddonTotal();
}
function updateAddonTotal(){
    if(!addonProduct)return;
    document.getElementById('addonTotal').textContent=`Total unitário: ${money((parseFloat(addonProduct.price)||0)+addonSum(selectedModalAddons()))}`;
}
function confirmAddonSelection(){
    if(!addonProduct)return;
    const groups=normalizeAddonGroups(addonProduct);
    for(let index=0;index<groups.length;index++){
        const count=document.querySelectorAll(`#addonGroups input[data-group="${index}"]:checked`).length;
        if(count<groups[index].min){
            document.getElementById('addonError').textContent=`Selecione pelo menos ${groups[index].min} opção(ões) em "${groups[index].name}".`;
            return;
        }
        if(groups[index].max>0&&count>groups[index].max){
            document.getElementById('addonError').textContent=`Selecione no máximo ${groups[index].max} opção(ões) em "${groups[index].name}".`;
            return;
        }
    }
    const product=addonProduct;
    const addons=selectedModalAddons();
    closeAddonModal();
    addConfiguredProduct(product,addons);
}
function askPaymentMethod(){
    const options=[
        {value:'pix',label:'PIX'},
        {value:'cash',label:'Dinheiro'},
        {value:'credit',label:'Cartão de crédito'},
        {value:'debit',label:'Cartão de débito'},
        {value:'picpay',label:'PicPay'},
        {value:'food_voucher',label:'Vale alimentação'}
    ];
    const modal=document.getElementById('paymentModal');
    const grid=document.getElementById('paymentGrid');
    const cancelBtn=document.getElementById('paymentCancelBtn');
    const confirmBtn=document.getElementById('paymentConfirmBtn');
    _paymentSelected=options[1];
    grid.innerHTML=options.map((o,i)=>`<button type="button" class="payment-opt ${i===1?'active':''}" data-pay="${o.value}">${o.label}</button>`).join('');
    grid.querySelectorAll('.payment-opt').forEach(btn=>{
        btn.onclick=()=>{
            const val=btn.getAttribute('data-pay');
            _paymentSelected=options.find(o=>o.value===val)||null;
            grid.querySelectorAll('.payment-opt').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
        };
    });
    modal.classList.add('show');
    modal.setAttribute('aria-hidden','false');
    return new Promise((resolve)=>{
        const close=(result)=>{
            modal.classList.remove('show');
            modal.setAttribute('aria-hidden','true');
            cancelBtn.onclick=null;
            confirmBtn.onclick=null;
            resolve(result);
        };
        cancelBtn.onclick=()=>close(null);
        confirmBtn.onclick=()=>close(_paymentSelected||null);
    });
}

// ── Theme ──
function getTheme(){return localStorage.getItem('pedrad-theme')||'dark'}
function applyTheme(t){document.documentElement.setAttribute('data-theme',t)}
function toggleTheme(){const n=getTheme()==='dark'?'light':'dark';localStorage.setItem('pedrad-theme',n);applyTheme(n)}
applyTheme(getTheme());

// ── View Mode ──
function setView(mode){
    viewMode=mode;
    document.getElementById('vGrid').classList.toggle('active',mode==='grid');
    document.getElementById('vList').classList.toggle('active',mode==='list');
    renderProducts();
}

// ── Load Products (snapshot) ──
function listenProducts(){
    if(unsub)unsub();
    unsub=db.collection('products').where('storeId','==',storeId).onSnapshot(snap=>{
        allProducts=snap.docs.map(d=>({id:d.id,...d.data()})).filter(p=>p.active!==false);
        allProducts.sort((a,b)=>(a.name||'').localeCompare(b.name||'','pt-BR'));
        categories=[...new Set(allProducts.map(p=>p.category).filter(Boolean))].sort();
        renderCatChips();
        renderProducts();
    },err=>{console.error(err);toast('Erro ao carregar')});
}

async function loadStore(){
    try{
        const[doc,mediaSnap]=await Promise.all([
            db.collection('stores').doc(storeId).get(),
            db.collection('stores').doc(storeId).collection('categoryMedia').get()
        ]);
        storeData=doc.exists?doc.data():{};
        storeData.categoryMedia=mediaSnap.docs.map(mediaDoc=>({id:mediaDoc.id,...mediaDoc.data()}));
        if(!storeData.categoryMedia.length&&doc.exists&&Array.isArray(doc.data()?.categoryMedia))storeData.categoryMedia=doc.data().categoryMedia;
    }catch(e){}
}

// ── Category Chips ──
function renderCatChips(){
    const el=document.getElementById('catChips');
    el.innerHTML=`<button class="cat-chip ${selectedCat==='all'?'active':''}" onclick="filterCat('all')">Todos</button>`
        +categories.map(c=>`<button class="cat-chip ${selectedCat===c?'active':''}" onclick="filterCat('${esc(c)}')">${esc(c)}</button>`).join('');
}

function filterCat(c){selectedCat=c;renderCatChips();renderProducts()}

// ── Render Products ──
function renderProducts(){
    const container=document.getElementById('productsContainer');
    const q=(document.getElementById('search').value||'').toLowerCase().trim();
    let list=[...allProducts];
    if(selectedCat!=='all')list=list.filter(p=>(p.category||'')===selectedCat);
    if(q)list=list.filter(p=>(p.name||'').toLowerCase().includes(q));

    if(!list.length){container.innerHTML='<div class="pdv-empty">Nenhum produto encontrado</div>';return}

    const isGrid=viewMode==='grid';
    container.innerHTML=`<div class="${isGrid?'pdv-grid':'pdv-list'}">${list.map(p=>{
        const img=productImage(p);
        const groups=normalizeAddonGroups(p);
        return`<div class="p-card" onclick="addToCart('${p.id}')">
            <div class="p-img">${img?`<img src="${esc(img)}" alt="" onerror="this.parentElement.innerHTML='<div class=ph>—</div>'">`:'<div class="ph">—</div>'}</div>
            <div class="p-body">
                <div><div class="p-name">${esc(p.name)}</div><div class="p-cat">${esc(p.category||'')}</div></div>
                <div class="p-price">${money(p.price)}</div>
                ${groups.length?`<div class="p-options">${groups.length} grupo(s) de opções</div>`:''}
            </div>
        </div>`;
    }).join('')}</div>`;
}

// ── Cart ──
function addToCart(productId){
    const p=allProducts.find(x=>x.id===productId);
    if(!p)return;
    if(normalizeAddonGroups(p).length){openAddonModal(p);return}
    addConfiguredProduct(p,[]);
}

function addConfiguredProduct(p,addons){
    const key=cartKey(p.id,addons);
    const existing=cart.find(c=>c.key===key);
    if(existing){existing.qty++;} 
    else{cart.push({key,id:p.id,name:p.name,price:parseFloat(p.price)||0,qty:1,addons})}
    renderCart();
}

function setQty(index,delta){
    const item=cart[index];
    if(!item)return;
    item.qty+=delta;
    if(item.qty<=0)cart.splice(index,1);
    renderCart();
}

function clearCart(){cart=[];renderCart()}

function isPcApp(){
    return !!window.PedraElectron?.sales?.add;
}

async function persistPdvRecord(order, kind){
    if(isPcApp()){
        return window.PedraElectron.sales.add({
            ...order,
            kind:kind||'sale',
            persistedIn:'local-db',
            createdAtLocal:new Date().toISOString(),
            updatedAtLocal:new Date().toISOString()
        });
    }
    return db.collection('orders').add(order);
}

function renderCart(){
    const el=document.getElementById('cartItems');
    const badge=document.getElementById('cartBadge');
    const totals=document.getElementById('cartTotals');
    const totalQty=cart.reduce((s,c)=>s+c.qty,0);
    badge.textContent=totalQty;

    if(!cart.length){
        el.innerHTML='<div class="cart-empty">Toque em um produto para adicionar</div>';
        totals.innerHTML='';
        return;
    }

    el.innerHTML=cart.map((c,index)=>{
        const itemTotal=unitPrice(c)*c.qty;
        const addons=Array.isArray(c.addons)?c.addons:[];
        return`<div class="cart-item">
            <div class="ci-info">
                <div class="ci-name">${esc(c.name)}</div>
                ${addons.length?`<div class="ci-addons">${addons.map(a=>`${esc(a.name)}${a.price>0?` (+${money(a.price)})`:''}`).join(' · ')}</div>`:''}
                <div class="ci-price">${money(unitPrice(c))} un.</div>
            </div>
            <div class="ci-qty">
                <button onclick="event.stopPropagation();setQty(${index},-1)">−</button>
                <span>${c.qty}</span>
                <button onclick="event.stopPropagation();setQty(${index},1)">+</button>
            </div>
            <div class="ci-total">${money(itemTotal)}</div>
        </div>`;
    }).join('');

    // Totals
    const subtotal=cart.reduce((s,c)=>s+unitPrice(c)*c.qty,0);
    const taxType=storeData?.localTaxType||'fixed'; // 'fixed' ou 'percent'
    const taxValue=storeData?.localTax||0;
    const taxAmount=taxType==='percent'?(subtotal*taxValue/100):taxValue;
    const total=subtotal;

    let html=`<div class="cart-row"><span>Venda da loja</span><span>${money(subtotal)}</span></div>`;
    if(taxAmount>0){
        const taxLabel=taxType==='percent'?`Taxa aplicativo PDV (${taxValue}%)`:`Taxa aplicativo PDV`;
        html+=`<div class="cart-row tax"><span>${taxLabel}</span><span>${money(taxAmount)}</span></div>`;
    }
    html+=`<div class="cart-row final"><span>Total da venda</span><span>${money(total)}</span></div>`;
    totals.innerHTML=html;
}

// ── Finalize Sale ──
async function finalizeSale(){
    if(!cart.length){toast('Carrinho vazio');return}
    if(!storeId){toast('StoreId não encontrado');return}
    const payment=await askPaymentMethod();
    if(payment===null){toast('Venda cancelada');return}
    if(!payment){toast('Forma de pagamento inválida');return}

    const subtotal=cart.reduce((s,c)=>s+unitPrice(c)*c.qty,0);
    const taxType=storeData?.localTaxType||'fixed';
    const taxValue=storeData?.localTax||0;
    const taxAmount=taxType==='percent'?(subtotal*taxValue/100):taxValue;
    const total=subtotal;

    const nowIso=new Date().toISOString();
    const order={
        storeId,
        source:'pdv',
        status:'delivered', // PDV local = entregue imediatamente
        items:cart.map(c=>({productId:c.id,name:c.name,price:c.price,qty:c.qty,addons:c.addons||[]})),
        subtotal,
        localTax:taxAmount,
        localTaxType:taxType,
        localTaxIncludedInTotal:false,
        total,
        deliveryFee:0,
        deliveryMode:'local',noDelivery:true,
        paymentMethod:payment.value,
        userName:'PDV Local',
        createdAt:isPcApp()?nowIso:firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt:isPcApp()?nowIso:firebase.firestore.FieldValue.serverTimestamp()
    };

    try{
        await persistPdvRecord(order,'sale');
        savePreset(cart);
        toast(isPcApp()?`Venda de ${money(total)} salva no PC (${payment.label})!`:`Venda de ${money(total)} registrada (${payment.label})!`);
        if(window.opener)window.opener.postMessage({type:'pdvSale'},'*');
        cart=[];
        renderCart();
    }catch(e){console.error(e);toast('Erro ao salvar venda')}
}

// ── Launch as Order (entra na fila de preparo) ──
async function launchAsOrder(){
    if(!cart.length){toast('Carrinho vazio');return}
    if(!storeId){toast('StoreId não encontrado');return}

    const subtotal=cart.reduce((s,c)=>s+unitPrice(c)*c.qty,0);
    const taxType=storeData?.localTaxType||'fixed';
    const taxValue=storeData?.localTax||0;
    const taxAmount=taxType==='percent'?(subtotal*taxValue/100):taxValue;
    const total=subtotal;

    const nowIso=new Date().toISOString();
    const order={
        storeId,
        source:'pdv',
        status:'confirmed', // entra direto como confirmado → fila de preparo
        items:cart.map(c=>({productId:c.id,name:c.name,price:c.price,qty:c.qty,addons:c.addons||[]})),
        subtotal,
        localTax:taxAmount,
        localTaxType:taxType,
        localTaxIncludedInTotal:false,
        total,
        deliveryFee:0,
        deliveryMode:'local',noDelivery:true,
        paymentMethod:'local',
        userName:'PDV Local',
        createdAt:isPcApp()?nowIso:firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt:isPcApp()?nowIso:firebase.firestore.FieldValue.serverTimestamp(),
        timeline:[{status:'confirmed',timestamp:new Date().toISOString(),message:'Confirmado via PDV'}]
    };

    try{
        await persistPdvRecord(order,'queue');
        savePreset(cart);
        toast(isPcApp()?`Pedido de ${money(total)} salvo localmente!`:`Pedido de ${money(total)} lançado na fila!`);
        if(window.opener)window.opener.postMessage({type:'pdvSale'},'*');
        cart=[];
        renderCart();
    }catch(e){console.error(e);toast('Erro ao lançar pedido')}
}

// ── Presets (top 5 combos salvos no localStorage) ──
function loadPresets(){
    try{return JSON.parse(localStorage.getItem(PRESETS_KEY))||[]}catch(e){return[]}
}

function savePreset(cartItems){
    // Cria key do combo (ids+qtys ordenados)
    const key=cartItems.map(c=>cartKey(c.id,c.addons)+':'+c.qty).sort().join('|');
    const presets=loadPresets();
    const existing=presets.find(p=>p.key===key);
    if(existing){existing.count++;existing.lastUsed=Date.now()}
    else{
        presets.push({
            key,
            label:cartItems.map(c=>c.qty>1?c.qty+'x '+c.name:c.name).join(' + '),
            items:cartItems.map(c=>({id:c.id,name:c.name,price:c.price,qty:c.qty,addons:c.addons||[]})),
            count:1,
            lastUsed:Date.now()
        });
    }
    // Keep top 5 by count
    presets.sort((a,b)=>b.count-a.count);
    localStorage.setItem(PRESETS_KEY,JSON.stringify(presets.slice(0,5)));
    renderPresets();
}

function renderPresets(){
    const presets=loadPresets();
    const bar=document.getElementById('presetsBar');
    const list=document.getElementById('presetsList');
    if(!presets.length){bar.classList.remove('has-items');return}
    bar.classList.add('has-items');
    list.innerHTML=presets.map((p,i)=>
        `<button class="preset-btn" onclick="applyPreset(${i})" title="${esc(p.label)}">${esc(p.label.length>30?p.label.slice(0,28)+'…':p.label)}</button>`
    ).join('');
}

function applyPreset(idx){
    const presets=loadPresets();
    const p=presets[idx];
    if(!p)return;
    // Verifica se produtos ainda existem
    cart=[];
    p.items.forEach(it=>{
        const product=allProducts.find(x=>x.id===it.id);
        const addons=Array.isArray(it.addons)?it.addons:[];
        const key=cartKey(it.id,addons);
        if(product){cart.push({key,id:product.id,name:product.name,price:product.price,qty:it.qty,addons})}
        else{cart.push({key,id:it.id,name:it.name+'?',price:it.price,qty:it.qty,addons})}
    });
    renderCart();
    toast('Combo aplicado');
}

// ── Init ──
(async()=>{
    const user=auth.currentUser||await new Promise(r=>{const u=auth.onAuthStateChanged(x=>{u();r(x)})});
    if(!user){document.getElementById('productsContainer').innerHTML='<div class="pdv-empty">Faça login primeiro</div>';return}
    if(window.PedraPcTs?.resolveStoreForFirebaseUser){
        const resolvedStore=await window.PedraPcTs.resolveStoreForFirebaseUser(db,{
            uid:String(user.uid||'').trim(),
            email:String(user.email||'').trim()
        },{knownIds:storeId?[storeId]:[]});
        if(resolvedStore?.id){
            storeId=resolvedStore.id;
            localStorage.setItem('currentStoreId',storeId);
        }
    }
    if(!storeId){document.getElementById('productsContainer').innerHTML='<div class="pdv-empty">StoreId não encontrado</div>';return}
    await loadStore();
    listenProducts();
    renderPresets();
    renderCart();
})();

window.addEventListener('beforeunload',()=>{if(unsub)unsub()});

// Keyboard: Escape fecha
document.addEventListener('keydown',e=>{
    if(e.key==='Escape')window.close();
});
