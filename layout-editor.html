<script>

function rc(){document.getElementById('clrs').innerHTML=CS.map(c=>`<div class="cd ${c===ac?'on':''}" style="background:${c}" onclick="sc('${c}')"></div>`).join('');document.documentElement.style.setProperty('--store-accent',ac)}
function sc(c){ac=c;rc();rp()}

function rp(){const t=T[sel];const s=document.getElementById('pv');const hasMedia=ae.includes('icon');const logoSrc=si||bannerImg;const bannerSrc=bannerImg||si;const isBanner=mediaMode==='banner'&&hasMedia;let h=`<div class="ph">`;
if(mediaMode==='icon'&&hasMedia){
const ic=`<div class="pi">${logoSrc?`<img src="${logoSrc}">`:''}</div>`;
if(t.ip==='l')h+=ic+'<span>Loja</span>';else if(t.ip==='r')h+='<span>Loja</span><span style="flex:1"></span>'+ic;else h+='<span style="flex:1"></span>'+ic+'<span style="flex:1"></span>';
}else{h+='<span>Loja</span><span style="flex:1"></span>'}
h+='</div>';
if(isBanner&&bannerPos!=='below'){const lS=bannerPos==='bc'?'left:50%;transform:translateX(-50%);bottom:12px':bannerPos==='br'?'right:12px;bottom:12px;left:auto':'left:12px;bottom:12px';const cH=bannerPos==='bc'?'':bannerPos==='br'?`<div class="pbanner-copy" style="left:12px;right:70px;bottom:14px"><div class="pbanner-title">Nome da Loja</div><div class="pbanner-sub">Aberto · 30-45 min</div></div>`:`<div class="pbanner-copy"><div class="pbanner-title">Nome da Loja</div><div class="pbanner-sub">Aberto · 30-45 min</div></div>`;h+=`<div class="pbanner"><div class="pbanner-bg">${bannerSrc?`<img src="${bannerSrc}" style="object-fit:${bannerFit}">`:''}</div><div class="pbanner-logo" style="${lS}">${logoSrc?`<img src="${logoSrc}">`:'LOGO'}</div>${cH}</div>`}
else if(isBanner&&bannerPos==='below'){h+=`<div class="pbanner" style="height:80px"><div class="pbanner-bg">${bannerSrc?`<img src="${bannerSrc}" style="object-fit:${bannerFit}">`:''}</div></div>`}
ae.forEach(id=>{if(id==='icon'&&!(isBanner&&bannerPos==='below'))return;
switch(id){
case 'icon':{const al=t.ip==='l'?'flex-start':t.ip==='r'?'flex-end':'center';h+=`<div style="padding:8px 10px;display:flex;justify-content:${al}"><div class="pi">${logoSrc?`<img src="${logoSrc}">`:''}</div></div>`;break}
case 'info':h+='<div class="pinfo"><div class="pinfo-n">Nome da Loja</div><div class="pinfo-d">Descrição</div><div class="pinfo-m"><span>★ 4.8</span><span>30-45 min</span></div></div>';break;
case 'search':h+='<div class="psrch"><div class="psrch-b"></div></div>';break;
case 'categories':h+=rpc(t.cm);break;
case 'featured':h+='<div class="pfeat">'+'123'.split('').map(n=>'<div class="pfc"><div class="pfc-i"></div><div class="pfc-n">Item '+n+'</div></div>').join('')+'</div>';break;
case 'products':h+=rpp(t.pm);break;
case 'promos':h+='<div class="ppromo"><div class="ppromo-c">Frete grátis +R$50</div></div>';break;
}});
s.classList.toggle('banner-mode',isBanner);s.innerHTML=h}
function rpc(m){if(m==='none')return'';if(m==='cards')return'<div class="pcards">'+'Lanches,Bebidas,Combos,Porções,Doces,Outros'.split(',').map(c=>'<div class="pcrd">'+c+'</div>').join('')+'</div>';
if(m==='dir')return'<div class="pdir">'+'Cervejas,Destilados,Vinhos,Sem álcool'.split(',').map(c=>'<div class="pdir-i"><span>'+c+'</span><span class="pdir-a">›</span></div>').join('')+'</div>';
return'<div class="pcats"><div class="pcat on">Todos</div>'+'Entradas,Pratos,Bebidas,Sobremesas'.split(',').map(c=>'<div class="pcat">'+c+'</div>').join('')+'</div>'}
function rpp(m){if(m==='mini')return'<div class="pmini">'+'Água,Refri,Suco,Café,Bolo,Pão'.split(',').map(n=>'<div class="pmc"><div class="pmc-n">'+n+'</div><div class="pmc-p">R$ 5</div><div class="pmc-a">+ carrinho</div></div>').join('')+'</div>';
if(m==='grid')return'<div class="pgrid">'+'1234'.split('').map(n=>'<div class="pgc"><div class="pgc-i"></div><div class="pgc-b"><div class="pgc-n">Produto '+n+'</div><div class="pgc-p">R$ 19,90</div></div></div>').join('')+'</div>';
return'<div class="plist">'+'X-Burger,Açaí 500ml,Coca 600ml'.split(',').map(n=>'<div class="pli"><div class="pli-i"></div><div><div class="pli-n">'+n+'</div><div class="pli-p">R$ 24,90</div></div></div>').join('')+'</div>'}

async function load(){if(!sid)return;try{const d=await db.collection('stores').doc(sid).get();if(!d.exists)return;const s=d.data();si=s.imageUrl||'';bannerImg=s.bannerUrl||s.bannerImageUrl||s.coverUrl||'';const c=s.layoutConfig;if(!c)return;if(c.template&&T[c.template])sel=c.template;if(c.elements?.length){ae=[...c.elements];de=new Set(ELS.map(e=>e.id).filter(id=>!ae.includes(id)))}if(c.accentColor)ac=c.accentColor;if(c.mediaMode==='banner'||c.mediaMode==='icon')mediaMode=c.mediaMode;if(c.bannerPos)bannerPos=c.bannerPos;if(c.bannerFit)bannerFit=c.bannerFit}catch(e){}}
async function save(){if(!sid){toast('Login necessário');return}const t=T[sel];try{await db.collection('stores').doc(sid).update({layoutConfig:{template:sel,elements:ae,accentColor:ac,iconPos:t.ip,mediaMode,bannerPos,bannerFit,productMode:t.pm,catMode:t.cm,updatedAt:new Date().toISOString()}});toast('Layout salvo!')}catch(e){toast('Erro')}}

(async()=>{if(!sid){toast('Login necessário');return}
const u=auth.currentUser||await new Promise(r=>{const un=auth.onAuthStateChanged(x=>{un();r(x)})});
if(!u){toast('Login necessário');return}await load();ra()})();
</script>
