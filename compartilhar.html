<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Compartilhar Loja - Pedra Delivery</title>
  <meta name="theme-color" content="#0a0a0c">
  <script>
    (function(){
      var keys=['pedrad-theme','theme','appTheme','data-theme','color-theme','pedrad_theme'];
      var theme='dark';
      for(var i=0;i<keys.length;i++){
        try{
          var v=localStorage.getItem(keys[i]);
          if(v==='light'||v==='dark'){theme=v;break;}
        }catch(_){ }
      }
      document.documentElement.setAttribute('data-theme',theme);
    })();
  </script>
  <link rel="stylesheet" href="style.css">
  <style>
    body{
      min-height:100vh;
      padding-top:env(safe-area-inset-top);
      padding-bottom:calc(env(safe-area-inset-bottom) + 24px);
      background:radial-gradient(ellipse at 50% 0%,var(--bg-2) 0%,var(--bg-0) 68%);
    }
    .container{max-width:720px;margin:0 auto;padding:20px}
    .page-header{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid var(--border)}
    .page-header h1{font-size:1.04rem;font-weight:600;letter-spacing:-.02em;text-align:center}
    .card{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--sh-sm);margin-bottom:14px}
    .card{text-align:center}
    .store-name{font-size:1rem;font-weight:700;letter-spacing:-.02em;color:var(--text-0);text-align:center}
    .store-sub{font-size:.8rem;color:var(--text-2);margin-top:4px;line-height:1.45;text-align:center}
    .link-wrap{display:flex;gap:8px;align-items:stretch;justify-content:center;margin-top:14px}
    .link-input{flex:1;min-height:44px;border:1px solid var(--border);background:var(--bg-2);color:var(--text-0);border-radius:12px;padding:10px 12px;font-size:.8rem}
    .link-input:focus{outline:none;border-color:var(--border-h)}
    .btn-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-top:10px;justify-items:center}
    .btn{min-height:42px;padding:0 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg-2);color:var(--text-0);font-size:.8rem;font-weight:600;cursor:pointer}
    .btn:hover{border-color:var(--border-h);background:var(--bg-3)}
    .btn.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-t)}
    .btn.full{grid-column:1 / -1}
    .qr-wrap{
      display:flex;
      justify-content:center;
      margin-top:14px;
    }
    .qr-box{
      border:1px solid var(--border);
      background:#fff;
      border-radius:12px;
      padding:10px;
      width:220px;
      height:220px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .qr-box img{
      width:200px;
      height:200px;
      display:block;
    }
    .qr-caption{
      margin-top:8px;
      text-align:center;
      font-size:.74rem;
      color:var(--text-2);
    }
    .muted{font-size:.74rem;color:var(--text-2);line-height:1.5;text-align:center}
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>

  <div class="container">
    <div class="page-header">
      <button class="btn" type="button" onclick="goBack()">Voltar</button>
      <h1>Compartilhar Loja</h1>
    </div>

    <div class="card">
      <div class="store-name" id="storeName">Carregando...</div>
      <div class="store-sub">Use este link para levar o cliente direto para a sua loja no app do cliente.</div>

      <div class="link-wrap">
        <input id="storeLink" class="link-input" type="text" readonly>
      </div>

      <div class="btn-grid">
        <button class="btn primary full" type="button" onclick="shareWhatsapp()">Compartilhar no WhatsApp</button>
      </div>

      <label for="waMessage" class="store-sub" style="display:block;margin-top:14px;text-align:center">Mensagem do WhatsApp</label>
      <textarea id="waMessage" class="link-input" style="min-height:96px;resize:vertical;text-align:left" placeholder="Digite a mensagem que será enviada"></textarea>

      <div class="qr-wrap">
        <div>
          <div class="qr-box">
            <img id="storeQr" alt="QR Code da loja">
          </div>
          <div class="qr-caption">Escaneie para abrir a loja direto no app</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="muted">
        Dica: você pode compartilhar em redes sociais, status e bio. O cliente abre o link e cai direto na sua vitrine.
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    const OFFICIAL_CLIENT_BASE = 'https://www.pedradelivery.com.br';

    let currentStoreId = null;
    let currentStoreName = 'Minha Loja';
    let currentLink = '';
    let currentBase = '';

    function toast(msg){
      const t=document.getElementById('toast');
      if(!t) return;
      t.textContent=msg;
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer=setTimeout(()=>t.classList.remove('show'),2200);
    }

    function goBack(){
      if(window.parent!==window) window.parent.postMessage('closePopup','*');
      else history.back();
    }

    function sanitizeBase(url){
      return String(url||'').replace(/\/$/, '');
    }

    function buildStoreLink(base, storeId){
      return sanitizeBase(base) + '/store.html?id=' + encodeURIComponent(storeId);
    }

    function resolveClientBase(){
      return sanitizeBase(OFFICIAL_CLIENT_BASE);
    }

    async function loadStore(){
      currentStoreId = localStorage.getItem('currentStoreId');
      if(!currentStoreId){
        document.getElementById('storeName').textContent = 'Loja não encontrada';
        document.getElementById('storeLink').value = '';
        toast('Faça login novamente para carregar a loja.');
        return;
      }

      currentBase = resolveClientBase();
      currentLink = buildStoreLink(currentBase, currentStoreId);

      document.getElementById('storeLink').value = currentLink;
      document.getElementById('storeQr').src =
        'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' + encodeURIComponent(currentLink);

      try{
        const doc = await db.collection('stores').doc(currentStoreId).get();
        if(doc.exists){
          const data = doc.data() || {};
          currentStoreName = data.name || data.storeName || currentStoreName;
        }
      }catch(_){ }

      document.getElementById('storeName').textContent = currentStoreName;
      const saved = localStorage.getItem('pedrad_whatsapp_share_message') || '';
      const defaultMsg = 'Peça agora na minha loja ' + currentStoreName + ' no Pedra Delivery: {link}';
      const waField = document.getElementById('waMessage');
      waField.value = saved || defaultMsg;
      waField.addEventListener('input', () => {
        localStorage.setItem('pedrad_whatsapp_share_message', waField.value);
      });
    }

    function shareWhatsapp(){
      if(!currentLink){ toast('Link indisponível.'); return; }
      const raw = (document.getElementById('waMessage')?.value || '').trim();
      const base = raw || ('Peça agora na minha loja ' + currentStoreName + ' no Pedra Delivery: {link}');
      const message = base.includes('{link}') ? base.replaceAll('{link}', currentLink) : (base + ' ' + currentLink);
      const text = encodeURIComponent(message);
      window.open('https://wa.me/?text=' + text, '_blank');
    }

    document.addEventListener('DOMContentLoaded', loadStore);
  </script>
</body>
</html>
