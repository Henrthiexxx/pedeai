<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pedra Delivery</title>
    <meta name="theme-color" content="#09090b">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" href="icon-192.png">
    <!-- Pré-carrega as páginas enquanto verifica auth -->
    <link rel="prefetch" href="login.html">
    <link rel="prefetch" href="home.html">
    <link rel="prefetch" href="style.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, system-ui, sans-serif;
            background: #0a0a0c;
            color: #f0f0f2;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 28px;
        }

        .splash-logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            opacity: 0;
            animation: fadeUp 0.5s 0.1s ease forwards;
        }

        .splash-sub {
            font-size: 0.8rem;
            color: #6e6e78;
            margin-top: 6px;
            opacity: 0;
            animation: fadeUp 0.5s 0.2s ease forwards;
        }

        .splash-spinner {
            width: 28px;
            height: 28px;
            border: 2px solid rgba(255,255,255,0.08);
            border-top-color: rgba(255,255,255,0.5);
            border-radius: 50%;
            animation: spin 0.7s linear infinite, fadeUp 0.5s 0.3s ease forwards;
            opacity: 0;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: none; }
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div>
        <div class="splash-logo">Pedra Delivery</div>
        <div class="splash-sub">Painel do estabelecimento</div>
    </div>
    <div class="splash-spinner"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        // app.js já inicializou o Firebase — só escuta o auth
        const fallback = setTimeout(() => window.location.replace('login.html'), 6000);

        firebase.auth().onAuthStateChanged((user) => {
            clearTimeout(fallback);
            window.location.replace(user ? 'home.html' : 'login.html');
        });
    </script>
</body>
</html>
